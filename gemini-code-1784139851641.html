<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador y Editor de Artículos - Blogger</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff5722;
            --primary-hover: #e64a19;
            --background: #f5f7fb;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #cccccc;
            --sidebar-width: 280px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- BARRA LATERAL IZQUIERDA --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #1e2229;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2c3e50;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #16191f;
            border-bottom: 1px solid #2c3e50;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--primary);
        }

        .sidebar-header p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #bdc3c7;
        }

        .articles-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .article-item {
            padding: 12px;
            background: #2c3e50;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-size: 14px;
            border-left: 4px solid transparent;
        }

        .article-item:hover {
            background: #34495e;
            transform: translateX(2px);
        }

        .article-item.active {
            border-left-color: var(--primary);
            background: #34495e;
        }

        .article-item-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .article-item-tags {
            font-size: 11px;
            color: #aeb6bf;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-refresh-sidebar {
            background: none;
            border: 1px solid #455a64;
            color: #ecf0f1;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-refresh-sidebar:hover {
            background: #2c3e50;
        }

        /* --- CONTENEDOR PRINCIPAL (DERECHA) --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            align-self: flex-start;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
            border-bottom: 2px solid var(--background);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-mode {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background-color: #e2e3e5;
            color: #383d41;
        }

        .badge-mode.edit {
            background-color: #fff3cd;
            color: #856404;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Editor Quill */
        .editor-wrapper {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background-color: #fafafa;
        }

        .ql-container.ql-snow {
            border: none !important;
            height: 300px;
            font-size: 16px;
        }

        /* Botón Subir Imagen */
        .btn-upload-image {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .btn-upload-image:hover {
            background-color: #e4e4e4;
            border-color: #999;
        }

        /* Grid Categorías */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            cursor: pointer;
            padding: 10px;
            background: #fafafa;
            border: 1px solid #eef0f4;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .checkbox-label:hover {
            background: #f0f0f0;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Añadir Categoría */
        .custom-category-box {
            display: flex;
            gap: 10px;
        }

        .btn-add-category {
            background-color: #333333;
            color: white;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add-category:hover {
            background-color: #555555;
        }

        /* Acciones del Formulario */
        .actions-box {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-publish {
            flex: 2;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-publish:hover {
            background-color: var(--primary-hover);
        }

        .btn-cancel-edit {
            flex: 1;
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none; /* Solo visible al editar */
        }

        .btn-cancel-edit:hover {
            background-color: #95a5a6;
        }

        .btn-publish:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            display: block;
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Artículos Blogger</h2>
            <p>Selecciona uno para editarlo</p>
            <button class="btn-refresh-sidebar" onclick="cargarArticulosPublicados()">
                🔄 Actualizar lista
            </button>
        </div>
        <div class="articles-list" id="articles-sidebar-list">
            <div style="text-align: center; color: #bdc3c7; padding: 20px; font-size: 13px;">
                Cargando artículos...
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>
                <span id="form-action-title">Nuevo Artículo</span>
                <span id="mode-badge" class="badge-mode">Modo Creador</span>
            </h1>
            
            <div class="form-group">
                <label for="post-title">Título del artículo</label>
                <input type="text" id="post-title" placeholder="Ej: Las 5 novedades de tecnología">
            </div>

            <div class="form-group">
                <label>Contenido del artículo</label>
                
                <button type="button" class="btn-upload-image" onclick="triggerSubirImagen()">
                    📷 Subir Imagen desde el Ordenador
                </button>
                <input type="file" id="file-uploader" accept="image/*" style="display: none;" onchange="procesarImagenSubida(event)">

                <div class="editor-wrapper">
                    <div id="editor-wysiwyg"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Selecciona las Categorías</label>
                <div class="categories-grid" id="categories-container">
                    <label class="checkbox-label">
                        <input type="checkbox" name="categoria" value="Criptomonedas"> Criptomonedas
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="categoria" value="Finanzas"> Finanzas
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="categoria" value="Mercados"> Mercados
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="categoria" value="Tecnologia"> Tecnología
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="new-category-input">Crear y añadir una categoría nueva</label>
                <div class="custom-category-box">
                    <input type="text" id="new-category-input" placeholder="Escribe un nombre (Ej: Emprendimiento)">
                    <button type="button" class="btn-add-category" onclick="crearNuevaCategoria()">Añadir</button>
                </div>
            </div>

            <div class="actions-box">
                <button id="btn-cancel-edit" class="btn-cancel-edit" onclick="desactivarModoEdicion()">Cancelar</button>
                <button id="btn-publish" class="btn-publish" onclick="publicarArticulo()">Publicar Entrada</button>
            </div>

            <div id="status-message" class="status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        let quill;
        let listaArticulos = []; 
        let articuloEnEdicionId = null; 

        document.addEventListener('DOMContentLoaded', () => {
            // Inicializar Quill
            quill = new Quill('#editor-wysiwyg', {
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link'],
                        ['clean']
                    ]
                },
                placeholder: 'Escribe aquí el cuerpo del artículo...',
                theme: 'snow'
            });

            cargarCategoriasPersonalizadas();
            cargarArticulosPublicados();
        });

        /* ==========================================================================
           LÓGICA PARA SUBIR IMÁGENES AL EDITOR
           ========================================================================== */
        function triggerSubirImagen() {
            document.getElementById('file-uploader').click();
        }

        function procesarImagenSubida(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', base64Image);
                quill.setSelection(range.index + 1);
            };
            reader.readAsDataURL(file);
            event.target.value = "";
        }

        /* ==========================================================================
           LÓGICA DE CATEGORÍAS PERSONALIZADAS Y LOCALSTORAGE
           ========================================================================== */
        function obtenerCategoriasDesdeStorage() {
            const guardadas = localStorage.getItem('blogger_custom_categories_list');
            return guardadas ? JSON.parse(guardadas) : [];
        }

        function cargarCategoriasPersonalizadas() {
            const customCats = obtenerCategoriasDesdeStorage();
            customCats.forEach(cat => {
                dibujarCasillaCategoria(cat, false);
            });
        }

        function crearNuevaCategoria() {
            const input = document.getElementById('new-category-input');
            const valor = input.value.trim();

            if (!valor) return;

            const categoriasExistentes = Array.from(document.querySelectorAll('input[name="categoria"]'))
                .map(cb => cb.value.toLowerCase());

            if (categoriasExistentes.includes(valor.toLowerCase())) {
                alert("Esta categoría ya existe en la lista.");
                input.value = "";
                return;
            }

            dibujarCasillaCategoria(valor, true);

            const guardadas = obtenerCategoriasDesdeStorage();
            guardadas.push(valor);
            localStorage.setItem('blogger_custom_categories_list', JSON.stringify(guardadas));

            input.value = "";
        }

        function dibujarCasillaCategoria(nombre, marcada = false) {
            const container = document.getElementById('categories-container');
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.innerHTML = `
                <input type="checkbox" name="categoria" value="${nombre}" ${marcada ? 'checked' : ''}> ${nombre}
            `;
            container.appendChild(label);
        }

        /* ==========================================================================
           LÓGICA DE LISTA LATERAL (SIDEBAR) Y LA EDICIÓN
           ========================================================================== */
        async function cargarArticulosPublicados() {
            const sidebarList = document.getElementById('articles-sidebar-list');
            sidebarList.innerHTML = '<div style="text-align: center; color: #bdc3c7; padding: 20px; font-size: 13px;">Cargando...</div>';

            try {
                const response = await fetch("/api/publish");
                if (response.ok) {
                    listaArticulos = await response.json();
                    renderizarSidebar();
                } else {
                    usarArticulosFallback();
                }
            } catch (error) {
                console.error("Error cargando artículos remotos:", error);
                usarArticulosFallback();
            }
        }

        function usarArticulosFallback() {
            const guardadosLocales = localStorage.getItem('blogger_local_backup_posts');
            listaArticulos = guardadosLocales ? JSON.parse(guardadosLocales) : [];
            renderizarSidebar();
        }

        function renderizarSidebar() {
            const sidebarList = document.getElementById('articles-sidebar-list');
            sidebarList.innerHTML = '';

            if (listaArticulos.length === 0) {
                sidebarList.innerHTML = `
                    <div style="text-align: center; color: #bdc3c7; padding: 20px; font-size: 13px;">
                        No hay artículos publicados aún.
                    </div>`;
                return;
            }

            listaArticulos.forEach((articulo, index) => {
                const item = document.createElement('div');
                const idArticulo = articulo.id || `idx-${index}`;
                
                item.className = `article-item ${articuloEnEdicionId === idArticulo ? 'active' : ''}`;
                item.onclick = () => cargarArticuloEnFormulario(idArticulo);

                const etiquetasTxt = articulo.labels && articulo.labels.length > 0 
                    ? articulo.labels.join(', ') 
                    : 'Sin etiquetas';

                item.innerHTML = `
                    <div class="article-item-title">${articulo.title}</div>
                    <div class="article-item-tags">🏷️ ${etiquetasTxt}</div>
                `;
                sidebarList.appendChild(item);
            });
        }

        function cargarArticuloEnFormulario(id) {
            articuloEnEdicionId = id;
            
            const articulo = listaArticulos.find((art, index) => {
                const artId = art.id || `idx-${index}`;
                return artId === id;
            });

            if (!articulo) return;

            document.getElementById('form-action-title').textContent = "Editar Artículo";
            const badge = document.getElementById('mode-badge');
            badge.textContent = "Modo Edición";
            badge.className = "badge-mode edit";
            document.getElementById('btn-publish').textContent = "Guardar Cambios";
            document.getElementById('btn-cancel-edit').style.display = "block";

            document.getElementById('post-title').value = articulo.title;
            quill.root.innerHTML = articulo.content;

            document.querySelectorAll('input[name="categoria"]').forEach(cb => cb.checked = false);

            if (articulo.labels) {
                articulo.labels.forEach(etiqueta => {
                    const checkboxExistente = Array.from(document.querySelectorAll('input[name="categoria"]'))
                        .find(cb => cb.value.toLowerCase() === etiqueta.toLowerCase());

                    if (checkboxExistente) {
                        checkboxExistente.checked = true;
                    } else {
                        dibujarCasillaCategoria(etiqueta, true);
                    }
                });
            }

            document.querySelectorAll('.article-item').forEach(item => item.classList.remove('active'));
            renderizarSidebar();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function desactivarModoEdicion() {
            articuloEnEdicionId = null;

            document.getElementById('form-action-title').textContent = "Nuevo Artículo";
            const badge = document.getElementById('mode-badge');
            badge.textContent = "Modo Creador";
            badge.className = "badge-mode";
            document.getElementById('btn-publish').textContent = "Publicar Entrada";
            document.getElementById('btn-cancel-edit').style.display = "none";

            document.getElementById('post-title').value = "";
            quill.setText("");
            document.querySelectorAll('input[name="categoria"]').forEach(cb => cb.checked = false);

            renderizarSidebar();
        }

        /* ==========================================================================
           PUBLICACIÓN Y GUARDADO DE CAMBIOS
           ========================================================================== */
        async function publicarArticulo() {
            const titleInput = document.getElementById("post-title");
            const btnPublish = document.getElementById("btn-publish");

            const titulo = titleInput.value.trim();
            const contenidoHtml = quill.root.innerHTML; 
            
            if (!titulo || contenidoHtml === '<p><br></p>' || contenidoHtml === '') {
                showStatus("Por favor, rellena el título y el contenido.", "error");
                return;
            }

            const etiquetas = [];
            const checkboxes = document.querySelectorAll('input[name="categoria"]:checked');
            checkboxes.forEach(cb => {
                etiquetas.push(cb.value);
            });

            const post = {
                kind: "blogger#post",
                title: titulo,
                content: contenidoHtml,
                labels: etiquetas
            };

            // PASAMOS EL ID Y UN PARÁMETRO CLAVE AL BACKEND
            if (articuloEnEdicionId) {
                post.id = articuloEnEdicionId;
                post.isUpdate = true; // El backend leerá esto para saber que no debe duplicar
                showStatus("Guardando cambios en el artículo...", "loading");
            } else {
                showStatus("Publicando nuevo artículo en Blogger...", "loading");
            }
            
            btnPublish.disabled = true;

            try {
                const response = await fetch("/api/publish", {
                    method: "POST", // Se usa POST pero el body decide si es update
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(post)
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus(articuloEnEdicionId ? "¡Cambios guardados con éxito!" : "¡Artículo publicado con éxito!", "success");
                    
                    // Sincronizar localmente
                    guardarEnBackupLocal(result.post || post);

                    desactivarModoEdicion();
                    cargarArticulosPublicados();
                } else {
                    showStatus("Error al procesar: " + (result.error || "Detalles en consola"), "error");
                    console.error("Detalle del error:", result);
                }
            } catch (error) {
                showStatus("Error de red. Cambios guardados en memoria local.", "error");
                console.error("Error:", error);

                guardarEnBackupLocal(post);
                desactivarModoEdicion();
                renderizarSidebar();
            } finally {
                btnPublish.disabled = false;
            }
        }

        function guardarEnBackupLocal(articulo) {
            const guardados = localStorage.getItem('blogger_local_backup_posts');
            let list = guardados ? JSON.parse(guardados) : [];

            if (articuloEnEdicionId) {
                list = list.map(art => {
                    const artId = art.id || `idx-${list.indexOf(art)}`;
                    if (artId === articuloEnEdicionId) {
                        return { ...art, title: articulo.title, content: articulo.content, labels: articulo.labels };
                    }
                    return art;
                });
            } else {
                if (!articulo.id) {
                    articulo.id = `local-${Date.now()}`;
                }
                list.unshift(articulo);
            }
            localStorage.setItem('blogger_local_backup_posts', JSON.stringify(list));
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById("status-message");
            statusDiv.className = "status " + type;
            statusDiv.textContent = message;
        }
    </script>
</body>
</html>
