<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Clientes - Astroup</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    /* Importación de tipografía serif de alta calidad para encabezados editoriales */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

    :root {
        --bg-main: #f8f8f8; /* Fondo crema cálido súper premium */
      --bg-sidebar: #313131; /* Gris/negro casi puro ultra elegante */
      --text-main: #1c1c1c;
      --text-muted: #6e6e6e;
      --border-color: #e5e3dd;
      --accent-color: #131313;
      --accent-bg: #f5f4f0;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-sans: "Plus Jakarta Sans", system-ui, sans-serif;
    }

    body {
      margin: 0;
      background-color: var(--bg-main);
      font-family: var(--font-sans);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* PANTALLA LOGIN */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      background: var(--bg-main);
    }

    .login-card {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 400px;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
    }

    .login-card .logo-area img {
      width: 120px;
      margin-bottom: 28px;
    }

    .login-heading {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .login-subheading {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-group-custom {
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      transition: all 0.2s ease;
    }

    .input-group-custom:focus-within {
      border-color: var(--text-main);
    }

    .input-group-custom .form-control-custom {
      background: transparent;
      border: none;
      padding: 14px 16px;
      font-size: 0.95rem;
      color: var(--text-main);
      width: 100%;
    }

    .input-group-custom .form-control-custom:focus {
      outline: none;
    }

    .input-group-custom .form-control-custom::placeholder {
      color: #b0afab;
    }

    .input-group-custom .btn-toggle-pass {
      background: transparent;
      border: none;
      color: #b0afab;
      padding: 0 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .btn-submit-custom {
      background: var(--bg-sidebar);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      width: 100%;
      transition: all 0.2s ease;
      margin-top: 16px;
    }

    .btn-submit-custom:hover {
      background: #2c2c2c;
    }

    .btn-submit-custom:disabled {
      background: #e5e3dd;
      color: #a3a19c;
      cursor: not-allowed;
    }

    #error-msg {
      font-size: 0.85rem;
      background: #fff5f5;
      color: #c53030;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #fed7d7;
      margin-bottom: 16px;
      font-weight: 500;
    }

    /* ESTILOS DEL DASHBOARD PRINCIPAL */
    .layout {
      display: flex;
      min-height: 100vh;
      flex-direction: row;
      background-color: var(--bg-main);
    }

    .sidebar {
      width: 270px;
      background-color: var(--bg-sidebar);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-container { 
      padding-bottom: 30px; 
    }
    .logo { 
      width: 110px; 
      display: block; 
      filter: brightness(0) invert(1); /* Mantiene logo en blanco */
    }

    /* Bloque Cliente en el Sidebar */
    .sidebar-client-box {
      margin-bottom: 25px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
    }
    .sidebar-client-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .sidebar-client-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: #ffffff;
      margin: 0;
      line-height: 1.3;
    }
    .sidebar-client-sub {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    .sidebar-menu {
      flex-grow: 1;
    }

    .sidebar-menu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .sidebar-menu a i {
      font-size: 1.1rem;
      margin-right: 12px;
    }

    .sidebar-menu a .menu-label-wrapper {
      display: flex;
      align-items: center;
    }

    .sidebar-menu a:hover { 
      color: #ffffff; 
      background-color: rgba(255, 255, 255, 0.03); 
    }
    
    .sidebar-menu a.active {
      background-color: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-weight: 600;
    }

    .sidebar-footer-link {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 16px;
    }
    .sidebar-footer-link:hover {
      color: #ffffff;
    }

    .content {
      flex: 1;
      padding: 48px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      overflow-x: hidden;
    }

    /* Títulos de sección ultra-minimalistas */
    .top-breadcrumb {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .welcome-section {
      margin-bottom: 40px;
    }

    .welcome-date {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .welcome-title {
      font-family: var(--font-serif);
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1.15;
      color: var(--text-main);
      margin-bottom: 16px;
    }

    .welcome-desc {
      font-size: 1rem;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.6;
      margin: 0;
    }

    /* Tarjetas de Contenedores */
    .card-custom {
      background-color: #ffffff;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01);
    }

    .kpis-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 20px; 
      margin-bottom: 40px; 
    }
    
    .kpi-card { 
      background-color: #ffffff; 
      border-radius: 16px; 
      border: 1px solid var(--border-color); 
      padding: 32px 28px; 
      display: flex; 
      flex-direction: column;
      justify-content: space-between;
      min-height: 140px;
    }

    .kpi-value {
      font-family: var(--font-serif);
      font-size: 2.4rem;
      font-weight: 400;
      margin: 0 0 8px 0;
      line-height: 1;
    }

    .kpi-title { 
      margin: 0; 
      font-size: 0.85rem; 
      color: var(--text-muted); 
      font-weight: 500; 
    }

    .section-title { 
      font-size: 1rem; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--text-main);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .section-title-link {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
    }

    /* Tablas ultra-limpias */
    .custom-table { 
      width: 100%; 
      margin-bottom: 0; 
    }
    .custom-table th { 
      font-weight: 500; 
      color: var(--text-muted); 
      font-size: 0.78rem; 
      border-bottom: 1px solid var(--border-color); 
      padding: 14px 12px; 
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .custom-table td { 
      padding: 18px 12px; 
      vertical-align: middle; 
      font-size: 0.9rem; 
      border-bottom: 1px solid #f1f0ec; 
      color: var(--text-main);
    }
    .custom-table tr:last-child td {
      border-bottom: none;
    }

    .badge-status { 
      padding: 4px 12px; 
      border-radius: 20px; 
      font-size: 0.78rem; 
      font-weight: 500; 
      display: inline-block; 
      border: 1px solid transparent;
    }
    .status-progreso { background-color: #f5f4f0; color: #5a5a5a; border-color: var(--border-color); }
    .status-revision { background-color: #fbf5e6; color: #b7791f; border-color: #f6e0b5; }
    .status-completado { background-color: #000000; color: #ffffff; }
    .status-defecto { background-color: #f5f4f0; color: var(--text-muted); }

    .empty-state { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.9rem; }
    .empty-icon { font-size: 1.8rem; color: #b0afab; margin-bottom: 8px; }

    /* Footer Banner (Estilo "¿Necesitas ampliar tu web?") */
    .banner-promo {
      background-color: #131313;
      border-radius: 16px;
      padding: 32px 40px;
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
    }
    .banner-promo h3 {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .banner-promo p {
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
      font-size: 0.9rem;
    }
    .banner-promo .btn-banner {
      background: #ffffff;
      color: #131313;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .banner-promo .btn-banner:hover {
      background: #f5f4f0;
    }

    /* RESPONSIVE MEDIA QUERIES */
    @media (max-width: 991.98px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-right: none; padding: 20px; display: block; }
      .logo-container { display: flex; justify-content: center; width: 100%; padding-bottom: 0; }
      .logo { margin-bottom: 0; }
      .sidebar-client-box { display: none; }
      
      .sidebar-menu {
        position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--bg-sidebar);
        border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around;
        align-items: center; padding: 8px 0; margin: 0; z-index: 1050;
      }
      .sidebar-menu a { margin-bottom: 0; padding: 8px; flex-direction: column; gap: 4px; font-size: 0.72rem; flex: 1; text-align: center; border-radius: 0; justify-content: center; }
      .sidebar-menu a.active { background-color: transparent; border-bottom: 2px solid #ffffff; }
      .sidebar-menu a i { font-size: 1.2rem; margin-right: 0; }
      .sidebar-menu a .bi-chevron-right { display: none; }
      .sidebar-footer-link { display: none; }
      .content { padding: 24px; padding-bottom: 100px; }
      .kpis-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .welcome-title { font-size: 2rem; }
      .banner-promo { flex-direction: column; text-align: center; gap: 20px; padding: 24px; }
    }

    @media (max-width: 575.98px) {
      .sidebar-menu a span { display: none; }
      .sidebar-menu a i { font-size: 1.4rem; }
      .kpis-grid { grid-template-columns: 1fr; }
      .welcome-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<div id="root-view" class="login-wrapper">
  <div class="login-card text-center">
    <div class="logo-area">
      <img src="https://i.ibb.co/wZTmq3Gb/image.png" alt="AstroUp">
    </div>
    
    <div class="login-heading">Portal de Clientes</div>
    <div class="login-subheading">Ingresa la clave asignada a tu cuenta para administrar tus proyectos.</div>
    
    <div id="error-msg" style="display:none;"></div>

    <div class="mb-3">
      <div class="input-group-custom">
        <input type="password" id="passInput" class="form-control-custom" placeholder="••••••••" onkeypress="evaluarTecla(event)">
        <button class="btn-toggle-pass" type="button" onclick="togglePasswordVisibility()">
          <i id="toggleIcon" class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    
    <button class="btn-submit-custom" id="loginBtn" onclick="procesarLogin()">
      Acceder <i class="bi bi-chevron-right ms-1" style="font-size: 0.85rem;"></i>
    </button>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const clienteId = urlParams.get('cliente') || "";

// !!! REEMPLAZA ESTO CON TU URL DE GOOGLE APPS SCRIPT !!!
const urlGoogleApp = "https://script.google.com/macros/s/AKfycbwlJJeyJk2mLONxfPBi45_mpM4NKnoG9Ozk0L-STULgqzvFvNweAiDD6ozrqUladfESrg/exec";

window.addEventListener('DOMContentLoaded', () => {
  if (!clienteId) return;

  const savedPassword = localStorage.getItem(`astroup_pass_${clienteId}`);
  if (savedPassword) {
    ejecutarPeticionLogin(savedPassword, true);
  }
});

function togglePasswordVisibility() {
  const input = document.getElementById("passInput");
  const icon = document.getElementById("toggleIcon");
  if (input.type === "password") {
    input.type = "text";
    icon.className = "bi bi-eye-slash";
  } else {
    input.type = "password";
    icon.className = "bi bi-eye";
  }
}

function evaluarTecla(e) {
  if (e.key === 'Enter') procesarLogin();
}

function procesarLogin() {
  const password = document.getElementById("passInput").value;
  if(!password) {
    mostrarError("Por favor, escribe tu contraseña.");
    return;
  }
  ejecutarPeticionLogin(password, false);
}

function ejecutarPeticionLogin(password, esAutoLogin) {
  const errorDiv = document.getElementById("error-msg");
  const btn = document.getElementById("loginBtn");

  if (!esAutoLogin && btn) {
    errorDiv.style.display = "none";
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status"></span> Validando clave...`;
  } else if (esAutoLogin) {
    const input = document.getElementById("passInput");
    if(input) { input.disabled = true; input.value = "••••••••••••"; }
    if(btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status"></span> Sincronizando...`; }
  }

  fetch(urlGoogleApp, {
    method: "POST",
    mode: "cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ clienteId: clienteId, password: password })
  })
  .then(res => res.json())
  .then(respuesta => {
    if (respuesta.exito) {
      localStorage.setItem(`astroup_pass_${clienteId}`, password);
      construirDashboardCompleto(respuesta.datos);
    } else {
      localStorage.removeItem(`astroup_pass_${clienteId}`);
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = `Acceder <i class="bi bi-chevron-right ms-1" style="font-size: 0.85rem;"></i>`;
      }
      const input = document.getElementById("passInput");
      if(input) { input.disabled = false; input.value = ""; }
      mostrarError(respuesta.mensaje || "La clave es incorrecta.");
    }
  })
  .catch(err => {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `Acceder <i class="bi bi-chevron-right ms-1" style="font-size: 0.85rem;"></i>`;
    }
    const input = document.getElementById("passInput");
    if(input) { input.disabled = false; }
    mostrarError("Error en la red. Inténtalo de nuevo.");
    console.error(err);
  });
}

function mostrarError(msg) {
  const errorDiv = document.getElementById("error-msg");
  if(errorDiv) {
    errorDiv.innerText = msg;
    errorDiv.style.display = "block";
  }
}

function obtenerClaseEstado(estado) {
  if (!estado) return 'status-defecto';
  const est = estado.trim().toLowerCase();
  if (est === 'en progreso') return 'status-progreso';
  if (est === 'en revisión' || est === 'en revision' || est === 'revision') return 'status-revision';
  if (est === 'completado' || est === 'finalizado' || est === 'terminado') return 'status-completado';
  return 'status-defecto';
}

function construirDashboardCompleto(data) {
  const nombre = data.cliente ? data.cliente[1] : "Cliente";
  const planWeb = "Plan Web"; // Coincide con la estética de tu imagen de referencia

  // Obtener fecha de hoy formateada de manera elegante: LUN, 13 JUL 2026 (por ejemplo)
  const opcionesFecha = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
  const fechaHoy = new Date().toLocaleDateString('es-ES', opcionesFecha).toUpperCase().replace(/\./g, '');

  const root = document.getElementById("root-view");
  root.className = "layout";
  root.style.background = "none";
  
  root.innerHTML = `
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="logo-container">
          <img class="logo" src="https://i.ibb.co/wZTmq3Gb/image.png" alt="Astroup">
        </div>

        <div class="sidebar-client-box">
          <div class="sidebar-client-label">Cliente</div>
          <p class="sidebar-client-name">${nombre}</p>
          <div class="sidebar-client-sub">${planWeb}</div>
        </div>

        <nav class="sidebar-menu">
          <a href="#" class="active">
            <span class="menu-label-wrapper"><i class="bi bi-house-door"></i> <span>Dashboard</span></span>
            <i class="bi bi-chevron-right" style="font-size: 0.75rem; margin-right: 0; opacity: 0.5;"></i>
          </a>
          <a href="#">
            <span class="menu-label-wrapper"><i class="bi bi-folder"></i> <span>Mis Ediciones</span></span>
          </a>
          <a href="#">
            <span class="menu-label-wrapper"><i class="bi bi-chat-square-dots"></i> <span>Soporte</span></span>
          </a>
          <a href="#">
            <span class="menu-label-wrapper"><i class="bi bi-file-earmark-text"></i> <span>Servicios</span></span>
          </a>
        </nav>
      </div>

      <a href="https://astroup.es" target="_blank" class="sidebar-footer-link">
        <i class="bi bi-box-arrow-up-right"></i> astroup.es
      </a>
    </div>

    <div class="content">
      <div class="top-breadcrumb">portal / dashboard</div>

      <div class="welcome-section">
        <div class="welcome-date">${fechaHoy}</div>
        <h1 class="welcome-title">Bienvenido,<br>${nombre}</h1>
        <p class="welcome-desc">Gestionamos tu presencia online para que tú te centres en tu negocio. Tu gestor es <strong>Jorge</strong>.</p>
      </div>

      <div class="kpis-grid">
        <div class="kpi-card">
          <h2 class="kpi-value">${data.proyectos ? data.proyectos.length : 0}</h2>
          <p class="kpi-title">Ediciones activas</p>
        </div>
        <div class="kpi-card">
          <h2 class="kpi-value">${data.tickets ? data.tickets.length : 0}</h2>
          <p class="kpi-title">Tickets abiertos</p>
        </div>
        <div class="kpi-card">
          <h2 class="kpi-value">${data.documentos ? data.documentos.length : 0}</h2>
          <p class="kpi-title">Documentos e información</p>
        </div>
      </div>

      <div class="card-custom">
        <div class="section-title">
          <span>Últimas ediciones</span>
          <a href="#" class="section-title-link">Ver todas →</a>
        </div>
        ${generarTablaProyectos(data.proyectos)}
      </div>

      <div class="card-custom">
        <div class="section-title">
          <span>Tickets de Soporte</span>
        </div>
        ${generarTablaTickets(data.tickets)}
      </div>

      <div class="card-custom">
        <div class="section-title">
          <span>Documentos e Información</span>
        </div>
        ${generarTablaDocumentos(data.documentos)}
      </div>

      <div class="banner-promo">
        <div>
          <h3>¿Necesitas ampliar tu web?</h3>
          <p>Nuevas páginas, funciones o un rediseño completo. Sin contratos largos.</p>
        </div>
        <a href="https://astroup.es/servicios.pdf" class="btn-banner">Ver servicios <i class="bi bi-arrow-right"></i></a>
      </div>
    </div>
  `;
}

function generarTablaProyectos(proyectos) {
  if (!proyectos || proyectos.length === 0) {
    return `<div class="empty-state"><div class="empty-icon"><i class="bi bi-folder-x"></i></div>No hay proyectos en curso.</div>`;
  }
  let h = `<div class="table-responsive-sm"><table class="table custom-table"><tbody>`;
  proyectos.forEach((p, index) => {
    // Generar un ID ficticio estilizado secuencial (ED-009, ED-008, etc.) para parecerse a la captura
    const codEdicion = `ED-00${index - 9}`;
    h += `<tr>
            <td style="width: 90px; color: var(--text-muted); font-size: 0.8rem;">${codEdicion}</td>
            <td class="fw-bold">${p[2]}</td>
            <td style="text-align: right;"><span class="badge-status ${obtenerClaseEstado(p[3])}">${p[3]}</span></td>
          </tr>`;
  });
  return h + `</tbody></table></div>`;
}

function generarTablaTickets(tickets) {
  if (!tickets || tickets.length === 0) {
    return `<div class="empty-state"><div class="empty-icon"><i class="bi bi-inbox"></i></div>No hay tickets abiertos.</div>`;
  }
  let h = `<div class="table-responsive-sm"><table class="table custom-table"><tbody>`;
  tickets.forEach((t, index) => {
    const codTicket = `TK-00${5 - index}`;
    h += `<tr>
            <td style="width: 90px; color: var(--text-muted); font-size: 0.8rem;">${codTicket}</td>
            <td class="fw-bold">${t[2]}</td>
            <td style="text-align: right;"><span class="badge-status ${obtenerClaseEstado(t[3])}">${t[3]}</span></td>
          </tr>`;
  });
  return h + `</tbody></table></div>`;
}

function generarTablaDocumentos(documentos) {
  if (!documentos || documentos.length === 0) {
    return `<div class="empty-state"><div class="empty-icon"><i class="bi bi-file-earmark"></i></div>No hay documentos disponibles.</div>`;
  }
  let h = `<div class="table-responsive-sm"><table class="table custom-table"><tbody>`;
  documentos.forEach(d => {
    const nombreDoc = d[3] ? d[3].toString().trim() : 'Documento adjunto';
    const urlDoc = d[2] ? d[2].toString().trim() : '#';

    h += `<tr>
            <td><i class="bi bi-file-earmark-pdf text-muted me-2"></i> ${nombreDoc}</td>
            <td class="text-end">
              <a href="${urlDoc}" target="_blank" class="btn btn-sm btn-outline-dark rounded-pill px-3" style="font-size: 0.8rem; font-weight: 500;">
                <i class="bi bi-box-arrow-up-right me-1"></i> Abrir
              </a>
            </td>
          </tr>`;
  });
  return h + `</tbody></table></div>`;
}
</script>

</body>
</html>
