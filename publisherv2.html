<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogger | Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0071e3; 
            --primary-hover: #0077ed;
            --background: #fbfbfd; 
            --card-bg: #ffffff;
            --text: #1d1d1f; 
            --text-secondary: #86868b; 
            --border: #d2d2d7; 
            --sidebar-width: 320px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BARRA LATERAL IZQUIERDA --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--card-bg); 
            color: var(--text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border); 
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 30px 24px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
        }

        .sidebar-header p {
            margin: 6px 0 0 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .articles-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .loading-fallback {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 13px;
        }

        .article-item {
            padding: 16px;
            background: var(--card-bg);
            margin-bottom: 8px;
            border-radius: 12px; 
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.15s ease;
            font-size: 14px;
            border: 1px solid transparent; 
        }

        .article-item:hover {
            background-color: #f5f5f7; 
        }

        .article-item.active {
            background-color: #f5f5f7;
            border-color: #e5e5e7;
        }

        .article-item-title {
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .article-item-tags {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-refresh-sidebar {
            background-color: #f5f5f7;
            border: none;
            color: var(--text);
            padding: 10px 16px;
            border-radius: 980px; 
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .btn-refresh-sidebar:hover {
            background-color: #e8e8ed;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 760px; 
            align-self: flex-start;
            padding-bottom: 60px; 
        }

        h1 {
            margin-top: 0;
            margin-bottom: 35px;
            color: var(--text);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-mode {
            font-size: 13px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 980px;
            background-color: #f5f5f7;
            color: var(--text-secondary);
        }

        .badge-mode.edit {
            background-color: #ffeef0;
            color: #ff3b30; /* Rojo Apple para alertar edición activa */
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); 
        }

        input[type="text"]::placeholder {
            color: #c7c7cc;
        }

        /* Editor Quill */
        .editor-wrapper {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            margin-top: 10px;
        }

        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background-color: #fafafc;
            padding: 10px 15px !important;
        }

        .ql-container.ql-snow {
            border: none !important;
            height: 380px;
            font-family: var(--font-family) !important;
            font-size: 16px !important;
            color: var(--text) !important;
        }
        
        .ql-editor {
            padding: 20px !important;
            line-height: 1.5;
        }

        .btn-upload-image {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #f5f5f7;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 980px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-upload-image:hover {
            background-color: #e8e8ed;
            border-color: #c7c7cc;
        }

        /* Categorías */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 400;
            font-size: 14px;
            cursor: pointer;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: background 0.2s, border-color 0.2s;
        }

        .checkbox-label:hover {
            background-color: #fbfbfd;
            border-color: #c7c7cc;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary); 
            cursor: pointer;
            margin: 0;
        }

        .custom-category-box {
            display: flex;
            gap: 10px;
        }
        
        .custom-category-box input[type="text"] {
            flex: 1;
        }

        .btn-add-category {
            background-color: #3a3a3c;
            color: white;
            border: none;
            padding: 0 22px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add-category:hover {
            background-color: #1d1d1f;
        }

        /* Acciones del Formulario */
        .actions-box {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .btn-publish {
            flex: 2;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 4px rgba(0, 113, 227, 0.15);
        }

        .btn-publish:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-publish:disabled {
            background-color: #a0cfff;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-cancel-edit {
            flex: 1;
            background-color: #f5f5f7;
            color: var(--text);
            border: none;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 980px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none; 
            text-align: center;
        }

        .btn-cancel-edit:hover {
            background-color: #e8e8ed;
        }

        .btn-publish:active {
            transform: scale(0.99);
        }

        /* Estados */
        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .status.success {
            display: block;
            background-color: #eafbef;
            color: #1a7f37;
            border: 1px solid #c3eecf;
        }

        .status.error {
            display: block;
            background-color: #fff1f1;
            color: #d12424;
            border: 1px solid #f9cdcd;
        }

        .status.loading {
            display: block;
            background-color: #f5f5f7;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Artículos</h2>
            <p>Selecciona para editar</p>
            <button class="btn-refresh-sidebar" onclick="cargarArticulosPublicados()">
                Sincronizar lista
            </button>
        </div>
        <div class="articles-list" id="articles-sidebar-list">
            <div class="loading-fallback">
                Cargando artículos...
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <h1>
                <span id="form-action-title">Nuevo Artículo</span>
                <span id="mode-badge" class="badge-mode">Borrador</span>
            </h1>
            
            <div class="form-group">
                <label for="post-title">Título</label>
                <input type="text" id="post-title" placeholder="Título descriptivo de la entrada">
            </div>

            <div class="form-group">
                <label>Cuerpo del artículo</label>
                
                <button type="button" class="btn-upload-image" onclick="triggerSubirImagen()">
                    <span style="font-size: 16px">⊕</span> Insertar Imagen local
                </button>
                <input type="file" id="file-uploader" accept="image/*" style="display: none;" onchange="procesarImagenSubida(event)">

                <div class="editor-wrapper">
                    <div id="editor-wysiwyg"></div>
                </div>
            </div>

          <div class="form-group">
    <label>Categorías</label>
    <div class="categories-grid" id="categories-container">
        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Criptomonedas"> Criptomonedas
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Finanzas"> Finanzas
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Mercados"> Mercados
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Tecnologia"> Tecnología
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="LifeStyle"> LifeStyle
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Política"> Política
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Deporte"> Deporte
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Curiosidades"> Curiosidades
        </label>

        <label class="checkbox-label">
            <input type="checkbox" name="categoria" value="Economia"> Economía
        </label>
    </div>
</div>
            <div class="form-group">
                <label for="new-category-input">Nueva categoría</label>
                <div class="custom-category-box">
                    <input type="text" id="new-category-input" placeholder="Ej: Emprendimiento">
                    <button type="button" class="btn-add-category" onclick="crearNuevaCategoria()">Añadir</button>
                </div>
            </div>

            <div class="actions-box">
                <button id="btn-cancel-edit" class="btn-cancel-edit" onclick="desactivarModoEdicion()">Cancelar</button>
                <button id="btn-publish" class="btn-publish" onclick="publicarArticulo()">Publicar Entrada</button>
            </div>

            <div id="status-message" class="status"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        let quill;
        let listaArticulos = []; 
        let articuloEnEdicionId = null; 

        document.addEventListener('DOMContentLoaded', () => {
            quill = new Quill('#editor-wysiwyg', {
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'clean']
                    ]
                },
                placeholder: 'Comienza a escribir tu historia...',
                theme: 'snow'
            });

            cargarCategoriasPersonalizadas();
            cargarArticulosPublicados();
        });

        function triggerSubirImagen() {
            document.getElementById('file-uploader').click();
        }

        function procesarImagenSubida(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', base64Image);
                quill.setSelection(range.index + 1);
            };
            reader.readAsDataURL(file);
            event.target.value = "";
        }

        function obtenerCategoriasDesdeStorage() {
            const guardadas = localStorage.getItem('blogger_custom_categories_list');
            return guardadas ? JSON.parse(guardadas) : [];
        }

        function cargarCategoriasPersonalizadas() {
            const customCats = obtenerCategoriasDesdeStorage();
            customCats.forEach(cat => {
                dibujarCasillaCategoria(cat, false);
            });
        }

        function crearNuevaCategoria() {
            const input = document.getElementById('new-category-input');
            const valor = input.value.trim();

            if (!valor) return;

            const categoriasExistentes = Array.from(document.querySelectorAll('input[name="categoria"]'))
                .map(cb => cb.value.toLowerCase());

            if (categoriasExistentes.includes(valor.toLowerCase())) {
                alert("Esta categoría ya existe.");
                input.value = "";
                return;
            }

            dibujarCasillaCategoria(valor, true);

            const guardadas = obtenerCategoriasDesdeStorage();
            guardadas.push(valor);
            localStorage.setItem('blogger_custom_categories_list', JSON.stringify(guardadas));

            input.value = "";
        }

        function dibujarCasillaCategoria(nombre, marcada = false) {
            const container = document.getElementById('categories-container');
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.innerHTML = `
                <input type="checkbox" name="categoria" value="${nombre}" ${marcada ? 'checked' : ''}> ${nombre}
            `;
            container.appendChild(label);
        }

        async function cargarArticulosPublicados() {
            const sidebarList = document.getElementById('articles-sidebar-list');
            sidebarList.innerHTML = '<div class="loading-fallback">Sincronizando...</div>';

            try {
                const response = await fetch("/api/publish");
                if (response.ok) {
                    listaArticulos = await response.json();
                    renderizarSidebar();
                } else {
                    usarArticulosFallback();
                }
            } catch (error) {
                console.error("Error cargando artículos remotos:", error);
                usarArticulosFallback();
            }
        }

        function usarArticulosFallback() {
            const guardadosLocales = localStorage.getItem('blogger_local_backup_posts');
            listaArticulos = guardadosLocales ? JSON.parse(guardadosLocales) : [];
            renderizarSidebar();
        }

        function renderizarSidebar() {
            const sidebarList = document.getElementById('articles-sidebar-list');
            sidebarList.innerHTML = '';

            if (listaArticulos.length === 0) {
                sidebarList.innerHTML = `
                    <div class="loading-fallback">
                        No hay entradas publicadas.
                    </div>`;
                return;
            }

            listaArticulos.forEach((articulo, index) => {
                const item = document.createElement('div');
                const idArticulo = articulo.id || `idx-${index}`;
                
                item.className = `article-item ${articuloEnEdicionId === idArticulo ? 'active' : ''}`;
                item.onclick = () => cargarArticuloEnFormulario(idArticulo);

                const etiquetasTxt = articulo.labels && articulo.labels.length > 0 
                    ? articulo.labels.join(', ') 
                    : 'Sin etiquetas';

                item.innerHTML = `
                    <div class="article-item-title">${articulo.title}</div>
                    <div class="article-item-tags">${etiquetasTxt}</div>
                `;
                sidebarList.appendChild(item);
            });
        }

        function cargarArticuloEnFormulario(id) {
            articuloEnEdicionId = id;
            
            const articulo = listaArticulos.find((art, index) => {
                const artId = art.id || `idx-${index}`;
                return artId === id;
            });

            if (!articulo) return;

            document.getElementById('form-action-title').textContent = "Editar";
            const badge = document.getElementById('mode-badge');
            badge.textContent = "Modo Edición";
            badge.className = "badge-mode edit";
            document.getElementById('btn-publish').textContent = "Guardar Cambios";
            document.getElementById('btn-cancel-edit').style.display = "block";

            document.getElementById('post-title').value = articulo.title;
            quill.root.innerHTML = articulo.content;

            document.querySelectorAll('input[name="categoria"]').forEach(cb => cb.checked = false);

            if (articulo.labels) {
                articulo.labels.forEach(etiqueta => {
                    const checkboxExistente = Array.from(document.querySelectorAll('input[name="categoria"]'))
                        .find(cb => cb.value.toLowerCase() === etiqueta.toLowerCase());

                    if (checkboxExistente) {
                        checkboxExistente.checked = true;
                    } else {
                        dibujarCasillaCategoria(etiqueta, true);
                    }
                });
            }

            document.querySelectorAll('.article-item').forEach(item => item.classList.remove('active'));
            renderizarSidebar();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function desactivarModoEdicion() {
            articuloEnEdicionId = null;

            document.getElementById('form-action-title').textContent = "Nuevo Artículo";
            const badge = document.getElementById('mode-badge');
            badge.textContent = "Borrador";
            badge.className = "badge-mode";
            document.getElementById('btn-publish').textContent = "Publicar Entrada";
            document.getElementById('btn-cancel-edit').style.display = "none";

            document.getElementById('post-title').value = "";
            quill.setText("");
            document.querySelectorAll('input[name="categoria"]').forEach(cb => cb.checked = false);

            renderizarSidebar();
        }

        /* ==========================================================================
           LÓGICA CORREGIDA PARA ACTUALIZAR EN LUGAR DE DUPLICAR
           ========================================================================== */
        async function publicarArticulo() {
            const titleInput = document.getElementById("post-title");
            const btnPublish = document.getElementById("btn-publish");

            const titulo = titleInput.value.trim();
            const contenidoHtml = quill.root.innerHTML; 
            
            if (!titulo || contenidoHtml === '<p><br></p>' || contenidoHtml === '') {
                showStatus("Añade un título y contenido antes de guardar.", "error");
                return;
            }

            const etiquetas = [];
            const checkboxes = document.querySelectorAll('input[name="categoria"]:checked');
            checkboxes.forEach(cb => {
                etiquetas.push(cb.value);
            });

            const post = {
                kind: "blogger#post",
                title: titulo,
                content: contenidoHtml,
                labels: etiquetas
            };

            let url = "/api/publish";
            let method = "POST";

            if (articuloEnEdicionId) {
                post.id = articuloEnEdicionId;
                post.isUpdate = true; // Para tu compatibilidad del backend
                
                // REST estándar: Enviamos a la ruta específica del ID usando PUT
                url = `/api/publish/${articuloEnEdicionId}`;
                method = "PUT"; 
                showStatus("Guardando cambios...", "loading");
            } else {
                showStatus("Publicando en Blogger...", "loading");
            }
            
            btnPublish.disabled = true;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(post)
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus(articuloEnEdicionId ? "Cambios guardados." : "Artículo publicado.", "success");
                    
                    // Sincronizar en LocalStorage para no duplicarlo localmente
                    guardarEnBackupLocal(result.post || post);

                    desactivarModoEdicion();
                    cargarArticulosPublicados();
                    
                    setTimeout(() => {
                         document.getElementById("status-message").style.display = 'none';
                    }, 3000);

                } else {
                    // FALLBACK: Si tu API backend no acepta PUT o "/api/publish/ID", 
                    // intentamos re-enviar por POST general pero manteniendo el identificador.
                    if (articuloEnEdicionId && response.status === 404) {
                        console.warn("Ruta PUT no encontrada. Reintentando con POST de compatibilidad...");
                        const fallbackResponse = await fetch("/api/publish", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(post)
                        });
                        
                        if (fallbackResponse.ok) {
                            const fallbackResult = await fallbackResponse.json();
                            showStatus("Cambios guardados (Compatibilidad).", "success");
                            guardarEnBackupLocal(fallbackResult.post || post);
                            desactivarModoEdicion();
                            cargarArticulosPublicados();
                            return;
                        }
                    }
                    showStatus("Error: " + (result.error || "Consulta la consola"), "error");
                }
            } catch (error) {
                showStatus("Error de red. Guardado de respaldo en memoria local.", "error");
                console.error("Error:", error);

                guardarEnBackupLocal(post);
                desactivarModoEdicion();
                renderizarSidebar();
            } finally {
                btnPublish.disabled = false;
            }
        }

        /* Guarda los cambios reemplazando la entrada por su ID y evita duplicados */
        function guardarEnBackupLocal(articulo) {
            const guardados = localStorage.getItem('blogger_local_backup_posts');
            let list = guardados ? JSON.parse(guardados) : [];

            if (articuloEnEdicionId) {
                list = list.map(art => {
                    const artId = art.id || `idx-${list.indexOf(art)}`;
                    if (artId === articuloEnEdicionId) {
                        return { 
                            ...art, 
                            title: articulo.title, 
                            content: articulo.content, 
                            labels: articulo.labels 
                        };
                    }
                    return art;
                });
            } else {
                if (!articulo.id) {
                    articulo.id = `local-${Date.now()}`;
                }
                list.unshift(articulo);
            }
            localStorage.setItem('blogger_local_backup_posts', JSON.stringify(list));
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById("status-message");
            statusDiv.className = "status " + type;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
        }
    </script>
</body>
</html>
