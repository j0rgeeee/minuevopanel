<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Artículos para Blogger</title>
    <style>
        :root {
            --primary: #ff5722;
            --primary-hover: #e64a19;
            --background: #f5f7fb;
            --card-bg: #ffffff;
            --text: #333333;
            --border: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
            border-bottom: 2px solid var(--background);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            height: 250px;
            resize: vertical;
            font-family: inherit;
        }

        .btn-publish {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-publish:hover {
            background-color: var(--primary-hover);
        }

        .btn-publish:active {
            transform: scale(0.98);
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            display: block;
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nuevo Artículo para Blogger</h1>
        
        <div class="form-group">
            <label for="post-title">Título del artículo</label>
            <input type="text" id="post-title" placeholder="Ej: Las 5 novedades de tecnología">
        </div>

        <div class="form-group">
            <label for="post-content">Contenido (Soporta HTML)</label>
            <textarea id="post-content" placeholder="Escribe aquí el cuerpo del artículo. Puedes usar etiquetas HTML como <p>, <b>, <img>, etc."></textarea>
        </div>

        <div class="form-group">
            <label for="post-tags">Etiquetas (Separadas por comas)</label>
            <input type="text" id="post-tags" placeholder="Ej: tecnologia, gadgets, internet">
        </div>

        <button id="btn-publish" class="btn-publish" onclick="publicarArticulo()">Publicar Entrada</button>

        <div id="status-message" class="status"></div>
    </div>

    <script>
        async function publicarArticulo() {
            const titleInput = document.getElementById("post-title");
            const contentInput = document.getElementById("post-content");
            const tagsInput = document.getElementById("post-tags");
            const statusDiv = document.getElementById("status-message");
            const btnPublish = document.getElementById("btn-publish");

            const titulo = titleInput.value.trim();
            const contenido = contentInput.value.trim();
            
            // Validar campos obligatorios
            if (!titulo || !contenido) {
                showStatus("Por favor, rellena el título y el contenido.", "error");
                return;
            }

            // Procesar etiquetas
            const etiquetas = tagsInput.value
                .split(",")
                .map(tag => tag.trim())
                .filter(tag => tag.length > 0);

            // Construir el objeto JSON con el formato exacto que pide Blogger
            const post = {
                kind: "blogger#post",
                title: titulo,
                content: contenido,
                labels: etiquetas
            };

            // Cambiar UI al estado "Cargando"
            showStatus("Publicando artículo en Blogger, por favor espera...", "loading");
            btnPublish.disabled = true;

            try {
                // Hacer la petición POST a la función Serverless de Vercel
                const response = await fetch("/api/publish", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(post)
                });

                const result = await response.json();

                if (response.ok) {
                    showStatus("¡Artículo publicado con éxito en tu Blogger!", "success");
                    // Limpiar el formulario tras el éxito
                    titleInput.value = "";
                    contentInput.value = "";
                    tagsInput.value = "";
                } else {
                    showStatus("Error al publicar: " + (result.error || "Detalles en consola"), "error");
                    console.error("Detalle del error del servidor:", result);
                }
            } catch (error) {
                showStatus("Error de red al intentar conectar con el servidor.", "error");
                console.error("Error de petición:", error);
            } finally {
                btnPublish.disabled = false;
            }
        }

        // Función auxiliar para mostrar alertas de estado vistosas
        function showStatus(message, type) {
            const statusDiv = document.getElementById("status-message");
            statusDiv.className = "status " + type;
            statusDiv.textContent = message;
        }
    </script>
</body>
</html>
