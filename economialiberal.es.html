<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión - Astroup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg-color: #1e1e1e;
            --container-bg: #2d2d2d;
            --card-bg: #383838;
            --card-hover: #454545;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #4a4a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor central del portal */
        .portal-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Encabezado con Logo y Cliente */
        .portal-header {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 8px;
        }

        .client-badge {
            background-color: var(--card-bg);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .client-badge strong {
            color: var(--text-color);
        }

        /* Rejilla de acceso rápido (2x2) */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* Botones Grandes Estilo Tarjeta */
        .portal-card {
            background-color: var(--card-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 35px 20px;
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        /* Efecto Hover para máxima accesibilidad visual */
        .portal-card:hover {
            background-color: var(--card-hover);
            transform: translateY(-4px);
            border-color: var(--border-color);
        }

        /* Tamaño y estilo de los iconos */
        .portal-card i {
            font-size: 2.8rem;
            opacity: 0.95;
        }

        /* Texto de los botones */
        .portal-card span {
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Diseño responsivo para móviles (pasan a ser 1 columna grande) */
        @media (max-width: 600px) {
            .portal-container {
                padding: 24px;
            }
            .portal-grid {
                grid-template-columns: 1fr;
            }
            .portal-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <header class="portal-header">
            <img class="logo" src="https://i.ibb.co/QFcsh1Nx/image.png" alt="Astroup">
            <div class="client-badge">
                Cliente: <strong>Carlos</strong> | Plan Web
            </div>
        </header>

        <main class="portal-grid">
            
            <a href="https://portal.astroup.es/publisherv2" class="portal-card">
                <i class="bi bi-plus-circle"></i>
                <span>Añade nuevo contenido</span>
            </a>

            <a href="https://www.economialiberal.es/p/banner.html" class="portal-card">
                <i class="bi bi-image"></i>
                <span>Actualizar banner</span>
            </a>

            <a href="https://portal.astroup.es/analytics" class="portal-card">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Ver analíticas</span>
            </a>

            <a href="https://www.economialiberal.es" target="_blank" class="portal-card">
                <i class="bi bi-globe"></i>
                <span>Ver web</span>
            </a>

        </main>

    </div>

</body>
</html>
